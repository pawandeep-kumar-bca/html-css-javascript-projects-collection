<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Change Effect On Website </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="imgBox">
            <img src="background_change_img/transparent.png" width="100%">
            <div class="imgWrap">
                <img src="background_change_img/original.jpg" id="original-img" >
            </div>
            <span id="span"><img src="background_change_img/arrow.png" class="arrow"></span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
